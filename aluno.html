<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle Remoto</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; padding-top: 30px; }
        .card { background: #333; padding: 20px; width: 85%; margin: 20px auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .status { padding: 15px; font-weight: bold; border-radius: 5px; margin-bottom: 20px; }
        .online { background: #004400; color: #00ff00; border: 1px solid #00ff00; }
        .offline { background: #440000; color: #ff3333; border: 1px solid #ff3333; }
        button { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; border: none; }
        .btn-redirect { background: #0066cc; color: white; }
        .btn-hack { background: #cc0000; color: white; }
        .btn-warn { background: #ff9900; color: black; }
        .btn-reset { background: #555; color: white; }
    </style>
</head>
<body>

    <h1>🎮 Controle Interativo Hack-Fake</h1>
    
    <div class="card">
        <div id="status-conexao" class="status offline">AGUARDANDO LEITURA DO QR CODE...</div>
        
        <h3>Selecione uma Ação para Enviar ao Alvo:</h3>
        <button class="btn-redirect" onclick="enviarComando('google')">🌐 1. Redirecionar para o Google</button>
        <button class="btn-redirect" onclick="enviarComando('youtube')">📺 2. Redirecionar para o YouTube</button>
        <button class="btn-hack" onclick="enviarComando('hack')">🚨 3. Ativar Tela Hack-Fake (Matrix)</button>
        <button class="btn-warn" onclick="enviarComando('alerta')">⚠️ 4. Disparar Pop-up de Alerta</button>
        <button class="btn-reset" onclick="enviarComando('reset')">🔄 5. Resetar Dispositivo da Professora</button>
    </div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('comando').set('');
        database.ref('status').set({ conectado: false });

        function enviarComando(tipo) {
            database.ref('comando').set(tipo);
        }

        database.ref('status').on('value', (snapshot) => {
            const status = snapshot.val();
            const box = document.getElementById('status-conexao');
            if (status && status.conectado) {
                box.innerText = "📱 PROFESSORA CONECTADA AO SISTEMA!";
                box.className = "status online";
            } else {
                box.innerText = "AGUARDANDO LEITURA DO QR CODE...";
                box.className = "status offline";
            }
        });
    </script>
</body>
</html>
